<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EU SABO! - IA EDITION</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --primary: #ffcc00; --secondary: #333; --danger: #ff4444;
            --success: #00c851; --bg: #1a1a1a; --card: #2a2a2a;
        }
        body { margin: 0; font-family: 'Arial Black', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .screen { display: none; flex-direction: column; align-items: center; width: 95%; max-width: 550px; background: var(--card); padding: 25px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); text-align: center; max-height: 90vh; overflow-y: auto; animation: fadeIn 0.3s ease; }
        .active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        h1 { font-size: 2.5rem; color: var(--primary); text-shadow: 3px 3px 0 var(--secondary); margin-bottom: 10px; }
        button { padding: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; border: none; border-radius: 12px; transition: 0.2s; text-transform: uppercase; width: 100%; margin-bottom: 10px; }
        .btn-main { background: var(--primary); color: #000; }
        .btn-ia { background: #6e45e2; color: white; }
        .btn-choice { background: #444; color: white; text-align: left; font-size: 0.85rem; padding: 15px; font-family: 'Arial', sans-serif; }
        .btn-choice:hover { background: var(--primary); color: #000; }
        
        input { padding: 15px; margin: 10px 0; border-radius: 12px; border: 3px solid #444; background: #111; color: white; width: 100%; text-align: center; font-size: 1.1rem; box-sizing: border-box; }
        #turn-banner { width: 100%; padding: 12px; border-radius: 10px; margin-bottom: 15px; font-weight: bold; color: #000; transition: 0.3s; }
        .your-turn { background: var(--success); }
        .others-turn { background: var(--primary); }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 100; justify-content: center; align-items: center; }
        .reveal-card { background: var(--card); border: 4px solid var(--primary); padding: 25px; border-radius: 25px; width: 85%; max-width: 400px; text-align: center; }
        
        .loading-ia { color: var(--primary); font-style: italic; margin: 10px 0; display: none; }
        #placar { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 20px; }
        .placar-item { background: #111; padding: 5px 12px; border-radius: 15px; border: 1px solid #444; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="modal-result" class="modal">
        <div class="reveal-card">
            <h2 id="res-status" style="margin-top:0">...</h2>
            <p style="font-size: 0.8rem; color: #aaa;">Resposta do Jogador:</p>
            <b id="res-p-ans"></b>
            <hr style="border: 0; border-top: 1px solid #444; margin: 15px 0;">
            <p style="font-size: 0.8rem; color: #aaa;">Resposta Real:</p>
            <b id="res-real-ans" style="color: var(--primary)"></b>
            <p id="res-curiosidade" style="font-size: 0.8rem; background: #000; padding: 15px; border-radius: 10px; margin-top: 15px;"></p>
            <button class="btn-main" onclick="closeModal()" style="margin-top: 20px;">PRÓXIMA</button>
        </div>
    </div>

    <div id="screen-menu" class="screen active">
        <h1>EU SABO! 🦆</h1>
        <input type="password" id="api-key" placeholder="API KEY (Dono da Sala)">
        <button class="btn-main" onclick="goTo('screen-create')">CRIAR SALA</button>
        <button class="btn-main" onclick="goTo('screen-join')">ENTRAR NA SALA</button>
    </div>

    <div id="screen-create" class="screen">
        <h2>CRIAR</h2>
        <input type="text" id="create-nick" placeholder="Seu Apelido">
        <p style="font-size: 0.8rem;">Carregue o arquivo de perguntas (.txt):</p>
        <input type="file" id="cards-file" accept=".txt">
        <button class="btn-main" onclick="logicCreateRoom()">GERAR SALA</button>
        <button onclick="goTo('screen-menu')" style="background:none; color:gray">VOLTAR</button>
    </div>

    <div id="screen-join" class="screen">
        <h2>ENTRAR</h2>
        <input type="text" id="join-nick" placeholder="Seu Apelido">
        <input type="text" id="join-code" placeholder="Código da Sala">
        <button class="btn-main" onclick="logicJoinRoom()">ENTRAR</button>
        <button onclick="goTo('screen-menu')" style="background:none; color:gray">VOLTAR</button>
    </div>

    <div id="screen-lobby" class="screen">
        <h2>LOBBY</h2>
        <p>CÓDIGO: <b id="lobby-room-code" style="color:var(--primary); font-size: 1.5rem;">---</b></p>
        <div id="player-list-lobby" style="margin: 20px 0;"></div>
        <button id="start-btn" class="btn-main" style="display:none" onclick="hostStart()">COMEÇAR JOGO</button>
    </div>

    <div id="screen-game" class="screen">
        <div id="turn-banner">CARREGANDO...</div>
        <div id="display-tema" style="color: var(--primary); font-weight: bold;"></div>
        
        <div id="choice-area" style="display:none; width:100%;">
            <p>Escolha o desafio para <b id="target-player" style="color:var(--primary)">...</b>:</p>
            <div id="choice-list" style="display:flex; flex-direction:column; gap:8px;"></div>
        </div>

        <div id="play-area" style="display:none; width: 100%;">
            <div id="question-text" style="background:#111; padding:20px; border-radius:15px; margin:15px 0; text-align: left; border-left: 6px solid var(--primary);"></div>
            <div id="loading-ia" class="loading-ia">Aguardando IA... 🦆</div>
            <input type="text" id="input-ans" placeholder="Sua resposta...">
            <button id="btn-send" class="btn-ia" onclick="handleAnswer()">ENVIAR RESPOSTA</button>
        </div>

        <div id="placar"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBxkvXpN8eoLhzEJaGr6o1JNgU8CpdPiWc",
            authDomain: "esseemeuamigo-1f262.firebaseapp.com",
            databaseURL: "https://esseemeuamigo-1f262-default-rtdb.firebaseio.com",
            projectId: "esseemeuamigo-1f262",
            storageBucket: "esseemeuamigo-1f262.firebasestorage.app",
            messagingSenderId: "611527572474",
            appId: "1:611527572474:web:5c5182a8a68a84d2f7c243"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let myData = { nick: '', roomCode: '', isOwner: false };
        let deckLocal = {};

        // --- LÓGICA DA IA (APENAS O HOST CHAMA) ---
        async function validarComIA(pergunta, respostaCorreta, respostaJogador) {
            const key = document.getElementById('api-key').value.trim();
            if(!key) return "ERRADO";
            const promptText = `Juiz de quiz. Pergunta: "${pergunta}". Resposta correta esperada: "${respostaCorreta}". O jogador respondeu: "${respostaJogador}". Compare semanticamente. Se o sentido for o mesmo, responda apenas "CORRETO". Caso contrário, "ERRADO".`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${key}`, {
                    method: "POST",
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
                });
                const data = await response.json();
                return data.candidates[0].content.parts[0].text.trim().toUpperCase();
            } catch (e) {
                console.error("Erro na IA:", e);
                return "ERRADO";
            }
        }

        // --- NAVEGAÇÃO E TXT ---
        function goTo(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        document.getElementById('cards-file').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const regex = /\((.*?)\)\s*(.*?)\s*\[(.*?)\]\s*"(.*?)"/g;
                let m; deckLocal = {};
                while ((m = regex.exec(ev.target.result)) !== null) {
                    const tema = m[1].toUpperCase();
                    if (!deckLocal[tema]) deckLocal[tema] = [];
                    deckLocal[tema].push({ q: m[2], a: m[3], c: m[4] });
                }
                alert("Perguntas carregadas!");
            };
            reader.readAsText(e.target.files[0]);
        });

        // --- SALA ---
        function logicCreateRoom() {
            const nick = document.getElementById('create-nick').value.trim();
            if(!nick || Object.keys(deckLocal).length === 0) return alert("Nick e TXT necessários!");
            const code = Math.random().toString(36).substring(2, 7).toUpperCase();
            myData = { nick, roomCode: code, isOwner: true };
            db.ref('rooms/' + code).set({
                status: 'waiting', players: [{nick}], deck: deckLocal, turnIndex: 0, chooserIndex: 0, phase: 'choosing', modalOpen: false, pendingAns: null
            }).then(() => listenToRoom(code));
        }

        function logicJoinRoom() {
            const nick = document.getElementById('join-nick').value.trim();
            const code = document.getElementById('join-code').value.trim().toUpperCase();
            if(!nick || !code) return alert("Preencha tudo!");
            db.ref('rooms/' + code).once('value', snapshot => {
                const room = snapshot.val();
                if(!room) return alert("Sala não existe!");
                let plys = room.players || [];
                plys.push({nick});
                db.ref('rooms/' + code + '/players').set(plys).then(() => {
                    myData = { nick, roomCode: code, isOwner: false };
                    listenToRoom(code);
                });
            });
        }

        function listenToRoom(code) {
            document.getElementById('lobby-room-code').innerText = code;
            if(myData.isOwner) document.getElementById('start-btn').style.display = 'block';
            goTo('screen-lobby');

            db.ref('rooms/' + code).on('value', async snapshot => {
                const room = snapshot.val();
                if(!room) return;

                // LOGICA DO HOST COMO JUIZ
                if(myData.isOwner && room.pendingAns && room.status === 'playing') {
                    const ansData = room.pendingAns;
                    db.ref('rooms/' + code + '/pendingAns').remove(); // Consome a resposta
                    
                    const result = await validarComIA(room.currentCard.q, room.currentCard.a, ansData.text);
                    
                    if(result === "ERRADO") {
                        room.scores[ansData.user] = (room.scores[ansData.user] || 0) + 1;
                    }
                    
                    room.modalOpen = true;
                    room.modalData = {
                        status: result === "CORRETO" ? "ACERTOU!" : "ERROU!",
                        pAns: ansData.text, realAns: room.currentCard.a, curio: room.currentCard.c
                    };
                    room.chooserIndex = room.turnIndex;
                    room.turnIndex = (room.turnIndex + 1) % room.players.length;
                    generateOptions(room);
                    db.ref('rooms/' + code).set(room);
                }

                updateUI(room);
            });
        }

        function updateUI(room) {
            document.getElementById('placar').innerHTML = room.players.map(p => `<div class="placar-item">${p.nick}: ${room.scores?.[p.nick] || 0}🦆</div>`).join('');
            
            if(room.status === 'waiting') {
                document.getElementById('player-list-lobby').innerHTML = room.players.map(p => `<div>• ${p.nick}</div>`).join('');
                return;
            }

            if(room.status === 'playing') {
                if(!document.getElementById('screen-game').classList.contains('active')) goTo('screen-game');
                const chooser = room.players[room.chooserIndex];
                const responder = room.players[room.turnIndex];

                if(room.phase === 'choosing') {
                    document.getElementById('choice-area').style.display = 'block';
                    document.getElementById('play-area').style.display = 'none';
                    document.getElementById('target-player').innerText = responder.nick;
                    document.getElementById('turn-banner').innerText = (chooser.nick === myData.nick) ? "ESCOLHA UMA PERGUNTA!" : "ESCOLHENDO: " + chooser.nick;
                    document.getElementById('turn-banner').className = (chooser.nick === myData.nick) ? "your-turn" : "others-turn";
                    
                    if(chooser.nick === myData.nick) {
                        document.getElementById('choice-list').innerHTML = room.options.map((opt, i) => `<button class="btn-choice" onclick="selectQuestion(${i})">${opt.q}</button>`).join('');
                    } else { document.getElementById('choice-list').innerHTML = "Aguardando escolha..."; }
                } else {
                    document.getElementById('choice-area').style.display = 'none';
                    document.getElementById('play-area').style.display = 'block';
                    document.getElementById('question-text').innerText = room.currentCard.q;
                    document.getElementById('turn-banner').innerText = (responder.nick === myData.nick) ? "SUA VEZ DE RESPONDER!" : "AGUARDANDO: " + responder.nick;
                    document.getElementById('turn-banner').className = (responder.nick === myData.nick) ? "your-turn" : "others-turn";
                    document.getElementById('btn-send').disabled = (responder.nick !== myData.nick);
                }
            }

            document.getElementById('modal-result').style.display = room.modalOpen ? 'flex' : 'none';
            if(room.modalOpen) {
                document.getElementById('res-status').innerText = room.modalData.status;
                document.getElementById('res-p-ans').innerText = room.modalData.pAns;
                document.getElementById('res-real-ans').innerText = room.modalData.realAns;
                document.getElementById('res-curiosidade').innerText = room.modalData.curio;
            }
        }

        // --- GAMEFLOW ---
        function hostStart() {
            db.ref('rooms/' + myData.roomCode).once('value', snapshot => {
                const room = snapshot.val();
                room.status = 'playing';
                room.scores = {};
                room.players.forEach(p => room.scores[p.nick] = 0);
                room.chooserIndex = 0; room.turnIndex = 1 % room.players.length;
                generateOptions(room);
                db.ref('rooms/' + myData.roomCode).set(room);
            });
        }

        function generateOptions(room) {
            const temas = Object.keys(room.deck);
            const tema = temas[Math.floor(Math.random() * temas.length)];
            room.currentTema = tema;
            room.options = room.deck[tema].sort(() => 0.5 - Math.random()).slice(0, 5);
            room.phase = 'choosing';
        }

        function selectQuestion(idx) {
            db.ref('rooms/' + myData.roomCode).once('value', snapshot => {
                const room = snapshot.val();
                room.currentCard = room.options[idx];
                room.phase = 'playing';
                db.ref('rooms/' + myData.roomCode).set(room);
            });
        }

        function handleAnswer() {
            const input = document.getElementById('input-ans');
            const ans = input.value.trim();
            if(!ans) return;
            document.getElementById('loading-ia').style.display = 'block';
            
            db.ref('rooms/' + myData.roomCode + '/pendingAns').set({
                text: ans, user: myData.nick
            });
            input.value = "";
            // O loading sai automaticamente quando o Host processa a IA e muda a fase.
            setTimeout(() => { document.getElementById('loading-ia').style.display = 'none'; }, 3000);
        }

        function closeModal() {
            db.ref('rooms/' + myData.roomCode + '/modalOpen').set(false);
        }
    </script>
</body>
</html>
